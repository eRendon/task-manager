<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Categorías</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-item class="ion-margin-bottom">
    <ion-input [(ngModel)]="newCategoryName" placeholder="Nueva categoría..." (keyup.enter)="addCategory()"></ion-input>
    <ion-button slot="end" (click)="addCategory()">
      <ion-icon name="add"></ion-icon>
    </ion-button>
  </ion-item>

  <ion-list>
    <ion-item *ngFor="let cat of categories">
      <ion-label>{{ cat.name }}</ion-label>
      <ion-button fill="clear" slot="end" (click)="editCategory(cat)">
        <ion-icon name="pencil-outline"></ion-icon>
      </ion-button>
      <ion-button fill="clear" color="danger" slot="end" (click)="deleteCategory(cat)">
        <ion-icon name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>
</ion-content>
