<div class="flex flex-col rounded-xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 p-4 gap-3 cursor-pointer active:opacity-80 transition-opacity" (click)="detail.emit(task)">
  <div class="flex justify-between items-start">
    <span class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">TASK-{{ task.id.toString() }}</span>
    <button (click)="$event.stopPropagation(); edit.emit(task)">
      <ion-icon name="create-outline" class="text-slate-400 text-xl"></ion-icon>
    </button>
  </div>

  <h3 class="text-base font-semibold leading-snug text-slate-900 dark:text-white">{{ task.title }}</h3>

  <p *ngIf="task.description" class="text-sm text-slate-600 dark:text-slate-300 line-clamp-2">
    {{ task.description }}
  </p>

  <div class="flex items-center justify-between mt-2">
    <div class="flex items-center gap-2">
      <!-- Categoría como Badge -->
      <ion-chip *ngIf="task.categoryId" class="px-2 py-0.5 rounded bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-xs font-bold uppercase tracking-wide">
        {{ getCategoryName(task.categoryId) }}
      </ion-chip>
      <ion-chip
      *ngIf="task.priority"
      class="px-2 py-0.5 rounded bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-xs font-bold uppercase tracking-wide"
      >{{ task.priority }}</ion-chip>
    </div>

    <div class="flex gap-2">
       <!-- Botón rápido para borrar -->
       <button (click)="$event.stopPropagation(); delete.emit(task)" class="text-red-500">
         <ion-icon name="trash-outline" class="text-xl"></ion-icon>
       </button>
    </div>
  </div>
</div>
